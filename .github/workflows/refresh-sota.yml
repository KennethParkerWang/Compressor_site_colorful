name: Refresh SOTA snapshots

on:
  schedule:
    # 每天 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:    # 手动触发
  push:
    paths:
      - 'scripts/fetch-sota.mjs'

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run fetcher
        run: node scripts/fetch-sota.mjs

      - name: Show diff (if any)
        run: |
          if git diff --quiet src/data/leaderboards.auto.json; then
            echo "No changes"
          else
            echo "Changes detected:"
            git diff --stat src/data/leaderboards.auto.json
          fi

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/leaderboards.auto.json
          if ! git diff --cached --quiet; then
            DATE=$(date -u +'%Y-%m-%d')
            git commit -m "chore(sota): refresh snapshots $DATE" || true
            git push
          fi